<script>
(function () {
    var container = document.getElementById('variants-container');
    var addBtn = document.getElementById('add-variant');
    var index = container ? container.querySelectorAll('.variant-row').length : 0;

    function bindRemove(row) {
        var btn = row.querySelector('.remove-variant');
        if (btn) {
            btn.addEventListener('click', function () { row.remove(); });
        }
    }

    if (container) {
        container.querySelectorAll('.variant-row').forEach(bindRemove);
    }

    if (addBtn && container) {
        addBtn.addEventListener('click', function () {
            var row = document.createElement('div');
            row.className = 'variant-row';
            row.innerHTML =
                '<div class="form-grid">' +
                '<div class="form-group"><label class="form-label">SKU</label><input type="text" name="variants[' + index + '][sku]" class="form-input"></div>' +
                '<div class="form-group"><label class="form-label">Label</label><input type="text" name="variants[' + index + '][variant_name]" class="form-input"></div>' +
                '<div class="form-group"><label class="form-label">Price</label><input type="number" step="0.01" min="0" name="variants[' + index + '][price]" class="form-input"></div>' +
                '<div class="form-group"><label class="form-label">Stock</label><input type="number" min="0" name="variants[' + index + '][stock_quantity]" class="form-input" value="0"></div>' +
                '</div>' +
                '<button type="button" class="btn-link-danger remove-variant">Remove variant</button>';
            container.appendChild(row);
            bindRemove(row);
            index++;
        });
    }
})();
</script>
